.bottom{min-height:0;border-top:1px solid var(--line);background:#090d13;display:grid;grid-template-rows:auto 1fr}.tabsbar{display:flex;align-items:center;gap:5px;padding:10px 14px;border-bottom:1px solid var(--line);background:#0e131b}.tab{background:transparent;color:var(--muted);border-color:transparent;padding:7px 14px}.tab.active{background:#19222e;color:var(--blue);border-color:var(--line)}.tabsbar .spacer{flex:1}.linkbtn{font-size:12px;color:var(--blue);text-decoration:none}.view{overflow:auto;min-height:0}

px;color:var(--danger)}

<body><div class="app">
<header><div class="brandmark">G</div><div class="brand"><h1>G Travel</h1><small>Multi-city project itinerary planner</small></div><div class="headstats"><div><b id="statStops">0</b>Stops</div><div><b id="statNights">0</b>Nights</div><div><b id="statKm">0</b>km</div></div></header>
<main><aside>
<h2>Add destination</h2><div class="searchrow"><input id="search" type="text" placeholder="Search airport, city or IATA"><button id="add" class="primary">Add</button></div><div class="results" id="results"></div>
<div class="actions"><button id="sample">Load sample</button><button id="autodates">Auto dates</button><button id="clear">Clear</button></div>
<h2 style="margin-top:22px">Itinerary</h2><div id="stopList" class="stop-list"></div><div id="empty" class="empty">Add your first destination to begin.</div>
<div class="summarycard"><div class="summarygrid"><div><b id="sumRange">—</b><span>Trip dates</span></div><div><b id="sumDuration">—</b><span>Total duration</span></div><div><b id="sumDistance">0 km</b><span>Great-circle distance</span></div><div><b id="sumLegs">0</b><span>Flight legs</span></div></div></div>
</aside>
<section class="workspace"><div class="mapbox"><div id="map2d" class="map-surface"></div><div id="map3d" class="map-surface hidden"></div><div class="map-switch"><button id="mode2d" class="active">2D map</button><button id="mode3d">3D globe</button></div><div class="map-overlay"><b id="mapTitle">Interactive 2D map</b><br><span id="mapSub" class="muted">Dark basemap · route fitted automatically</span></div></div>
<div class="bottom"><div class="tabsbar"><button class="tab active" data-view="gantt">Project timeline</button><button class="tab" data-view="calendar">Large calendar</button><button class="tab" data-view="legs">Flight legs</button><div class="spacer"></div><div class="flight-export"><button id="googleFlights" class="primary">Search Google Flights</button><div id="exportMenu" class="export-menu"></div></div><a href="#" id="csv" class="linkbtn">Download CSV</a></div><div id="view" class="view"></div></div></section>
</main></div>

function dayMap(){const out={};stops.forEach((s,i)=>{if(!s.date)return;const d=parseDate(s.date),len=nights(i);for(let n=0;n<len;n++)out[iso(addDays(d,n))]={i,arrival:n===0}});return out}
function renderCalendar(){const b=dateBounds();if(!b){$('#view').innerHTML='<div class="empty" style="margin:30px">Set arrival dates to populate the calendar.</div>';return}const mapd=dayMap();const first=new Date(b.start.getFullYear(),b.start.getMonth(),1),last=new Date(b.end.getFullYear(),b.end.getMonth(),1);let months='';for(let m=new Date(first);m<=last;m.setMonth(m.getMonth()+1)){const y=m.getFullYear(),mo=m.getMonth(),offset=(new Date(y,mo,1).getDay()+6)%7,nd=new Date(y,mo+1,0).getDate();let cells=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(x=>`<div class="wd">${x}</div>`).join('');for(let i=0;i<offset;i++)cells+='<div class="day blank"></div>';for(let d=1;d<=nd;d++){const dt=new Date(y,mo,d),info=mapd[iso(dt)];cells+=`<div class="day ${info?'intrip':''}"><span class="daynum">${d}</span>${info?`${info.arrival?'<span class="arrival">✈</span>':''}<div class="citychip" style="background:${color(info.i)}">${stops[info.i].a[0]} · ${stops[info.i].a[1]}</div>`:''}</div>`}months+=`<section class="month"><div class="month-title">${m.toLocaleDateString(undefined,{month:'long',year:'numeric'})}</div><div class="cal-grid">${cells}</div></section>`}const leg=stops.map((s,i)=>`<span><i style="background:${color(i)}"></i>${s.a[0]} ${s.a[1]}</span>`).join('');$('#view').innerHTML=`<div class="calendar-shell"><div class="calendar-top"><div><h3>Trip calendar</h3><span class="muted">Large monthly planning view</span></div><div class="spacer"></div></div><div class="months">${months}</div><div class="legend">${leg}</div></div>`}
function renderLegs(){if(stops.length<2){$('#view').innerHTML='<div class="empty" style="margin:30px">Add at least two destinations to create flight legs.</div>';return}let rows='',total=0;for(let i=0;i<stops.length-1;i++){const d=hav(stops[i].a,stops[i+1].a);total+=d;rows+=`<tr><td>${i+1}</td><td><b>${stops[i].a[0]}</b> · ${stops[i].a[1]}</td><td><b>${stops[i+1].a[0]}</b> · ${stops[i+1].a[1]}</td><td>${stops[i+1].date?fmt(parseDate(stops[i+1].date),true):'—'}</td><td class="num">${Math.round(d).toLocaleString()}</td></tr>`}$('#view').innerHTML=`<table><thead><tr><th>#</th><th>From</th><th>To</th><th>Arrival</th><th class="num">Distance (km)</th></tr></thead><tbody>${rows}<tr class="total"><td></td><td>Total</td><td>${stops.length-1} legs</td><td></td><td class="num">${Math.round(total).toLocaleString()}</td></tr></tbody></table>`}
function renderView(){activeView==='gantt'?renderGantt():activeView==='calendar'?renderCalendar():renderLegs()}
function query(q){q=q.trim().toLowerCase();if(!q)return[];return AIRPORTS.map(a=>({a,score:a[0].toLowerCase()===q?0:a[1].toLowerCase().startsWith(q)?1:(a[0]+' '+a[1]+' '+a[2]+' '+a[5]).toLowerCase().includes(q)?2:99})).filter(x=>x.score<99).sort((x,y)=>x.score-y.score).slice(0,9).map(x=>x.a)}
function showResults(){const list=query($('#search').value),r=$('#results');r.innerHTML=list.map((a,i)=>`<div class="res" data-i="${i}"><span class="iata">${a[0]}</span><div>${a[1]}<small>${a[5]} · ${a[2]}</small></div></div>`).join('');r.classList.toggle('open',!!list.length);r._list=list}
function addAirport(a){const prev=stops.at(-1);let date=null;if(prev?.date)date=iso(addDays(parseDate(prev.date),nights(stops.length-1)));stops.push({a,date,nights:3});$('#search').value='';$('#results').classList.remove('open');render()}
$('#search').oninput=showResults;$('#search').onkeydown=e=>{if(e.key==='Enter'){const a=query(e.target.value)[0];if(a)addAirport(a)}};$('#add').onclick=()=>{const a=query($('#search').value)[0];if(a)addAirport(a)};$('#results').onclick=e=>{const x=e.target.closest('.res');if(x)addAirport($('#results')._list[+x.dataset.i])};
$('#stopList').onclick=e=>{const b=e.target.closest('button');if(!b)return;let i;if(b.dataset.rm!=null){i=+b.dataset.rm;stops.splice(i,1)}else if(b.dataset.up!=null){i=+b.dataset.up;if(i>0)[stops[i-1],stops[i]]=[stops[i],stops[i-1]]}else if(b.dataset.dn!=null){i=+b.dataset.dn;if(i<stops.length-1)[stops[i+1],stops[i]]=[stops[i],stops[i+1]]}render()};
$('#stopList').onchange=e=>{if(e.target.dataset.date!=null){const i=+e.target.dataset.date;stops[i].date=e.target.value||null;if(i<stops.length-1&&stops[i].date){let d=parseDate(stops[i].date);for(let j=i+1;j<stops.length;j++){d=addDays(d,nights(j-1));stops[j].date=iso(d)}}}if(e.target.dataset.night!=null)stops[+e.target.dataset.night].nights=Math.max(1,+e.target.value||1);render()};
function autoDates(){let d=parseDate(stops[0]?.date)||new Date();d=new Date(d.getFullYear(),d.getMonth(),d.getDate());stops.forEach((s,i)=>{s.date=iso(d);d=addDays(d,nights(i))});render()}
$('#autodates').onclick=autoDates;$('#clear').onclick=()=>{stops=[];render()};$('#sample').onclick=()=>{const plan=[['JNB',0],['DXB',4],['LHR',7],['IST',11],['NRT',15],['HKG',20],['JNB',24]],base=new Date();base.setHours(0,0,0,0);stops=plan.map(([c,o],i)=>({a:AIRPORTS.find(a=>a[0]===c),date:iso(addDays(base,o)),nights:i===plan.length-1?1:3}));render()};
$$('.tab').forEach(t=>t.onclick=()=>{$$('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');activeView=t.dataset.view;renderView()});
function flightDateForLeg(i){return stops[i+1]?.date||null}
function googleFlightsUrl(query){return 'https://www.google.com/travel/flights?q='+encodeURIComponent(query)}
function buildFlightQuery(i){const from=stops[i],to=stops[i+1],date=flightDateForLeg(i);if(!from||!to)return null;return `Flights from ${from.a[0]} to ${to.a[0]}${date?' on '+date:''}`}
function openGoogleFlights(query){window.open(googleFlightsUrl(query),'_blank','noopener,noreferrer')}
function renderExportMenu(){const menu=$('#exportMenu');if(stops.length<2){menu.innerHTML='<h4>Google Flights export</h4><p>Add at least two destinations first.</p>';return}const missing=[];const legs=[];for(let i=0;i<stops.length-1;i++){const date=flightDateForLeg(i);if(!date)missing.push(i+1);legs.push({i,date,query:buildFlightQuery(i)})}const combined='Multi-city '+legs.map(x=>buildFlightQuery(x.i)).join(', then ');menu.innerHTML=`<h4>Smart Google Flights export</h4><p>Open the full journey as one natural-language multi-city search, or search each dated leg independently.</p><button class="export-all" data-all="1"><b>Open complete multi-city search</b><br><span class="muted">${stops.map(s=>s.a[0]).join(' → ')}</span></button><div class="leg-searches">${legs.map(x=>`<div class="leg-search"><div><b>Leg ${x.i+1}: ${stops[x.i].a[0]} → ${stops[x.i+1].a[0]}</b><small>${x.date?fmt(parseDate(x.date),true):'Flexible date — arrival date not set'}</small></div><button data-leg="${x.i}">Search</button></div>`).join('')}</div>${missing.length?`<div class="warning">Dates missing for leg${missing.length>1?'s':''} ${missing.join(', ')}. Google Flights will treat those searches as flexible.</div>`:''}`;menu._combined=combined}
$('#googleFlights').onclick=e=>{e.stopPropagation();renderExportMenu();$('#exportMenu').classList.toggle('open')};
$('#exportMenu').onclick=e=>{const all=e.target.closest('[data-all]'),leg=e.target.closest('[data-leg]');if(all)openGoogleFlights($('#exportMenu')._combined);if(leg)openGoogleFlights(buildFlightQuery(+leg.dataset.leg))};
document.addEventListener('click',e=>{if(!e.target.closest('.flight-export'))$('#exportMenu').classList.remove('open')});
$('#csv').onclick=e=>{e.preventDefault();if(!stops.length)return;let s='stop,iata,city,country,arrival,nights,next_stop,distance_km\n';stops.forEach((x,i)=>{const n=stops[i+1],d=n?hav(x.a,n.a):'';s+=`${i+1},${x.a[0]},"${x.a[1]}","${x.a[2]}",${x.date||''},${nights(i)},${n?n.a[0]:''},${d===''?'':d.toFixed(0)}\n`});const u=URL.createObjectURL(new Blob([s],{type:'text/csv'})),a=document.createElement('a');a.href=u;a.download='g-travel-project-itinerary.csv';a.click();URL.revokeObjectURL(u)};
try{const saved=JSON.parse(localStorage.getItem('gTravelStops')||'[]');stops=saved.map(s=>({a:AIRPORTS.find(a=>a[0]===s.iata),date:s.date,nights:s.nights||3})).filter(s=>s.a)}catch{}render();setTimeout(()=>map2d.invalidateSize(),100);
</script></body></html>
