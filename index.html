<style>
:root{--bg:#08070d;--panel:#11101a;--panel2:#171522;--line:#302c3d;--ink:#f4f1fa;--muted:#9a93aa;--blue:#72d4d8;--gold:#e6b86a;--green:#77c7a2;--danger:#ef7d91;--violet:#9f8cff;--shadow:0 18px 50px rgba(0,0,0,.48)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--ink);font:14px/1.45 "Plus Jakarta Sans","Segoe UI",system-ui,sans-serif}button,input{font:inherit}button{cursor:pointer}.app{min-height:100vh;display:grid;grid-template-rows:auto 1fr}
header{height:68px;padding:0 20px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--line);background:rgba(10,8,15,.94);backdrop-filter:blur(10px);position:sticky;top:0;z-index:1000}.brandmark{width:44px;height:44px;border-radius:13px;display:grid;place-items:center;background:linear-gradient(145deg,#171329,#0b1921);border:1px solid #40385d;box-shadow:0 10px 26px rgba(75,211,216,.14);overflow:hidden}.brandmark svg{width:38px;height:38px;display:block}.brand h1{font-size:18px;margin:0}.brand small,.muted{color:var(--muted)}.headstats{margin-left:auto;display:flex;gap:22px;font-size:12px}.headstats b{display:block;color:var(--ink);font-size:16px}
main{min-height:0;display:grid;grid-template-columns:370px minmax(0,1fr)}aside{background:#0c0a12;border-right:1px solid var(--line);padding:18px;overflow:auto}.workspace{min-width:0;display:grid;grid-template-rows:minmax(430px,52vh) minmax(420px,1fr)}
h2{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin:4px 0 10px}.searchrow{display:flex;gap:8px}.searchrow input{flex:1}.control,input[type=text],input[type=date],input[type=number]{background:#100e18;border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:9px 10px;outline:none}.control:focus,input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(73,162,209,.12)}button{border:1px solid var(--line);background:#161d28;color:var(--ink);border-radius:9px;padding:9px 12px}button:hover{border-color:#3e5268}.primary{background:linear-gradient(180deg,#9f8cff,#6e62ca);border-color:#ad9cff;color:#fff}.primary:hover{filter:brightness(1.08)}.actions{display:flex;gap:8px;margin-top:10px}.actions button{flex:1}.results{display:none;margin-top:6px;border:1px solid var(--line);background:#0d121a;border-radius:10px;overflow:hidden}.results.open{display:block}.res{display:flex;gap:10px;padding:9px 11px;border-bottom:1px solid #1a222d;cursor:pointer}.res:hover{background:#17202b}.iata{width:40px;color:var(--blue);font-weight:900}.res small{display:block;color:var(--muted)}
.stop-list{display:flex;flex-direction:column;gap:10px}.empty{border:1px dashed var(--line);border-radius:12px;padding:20px;text-align:center;color:var(--muted)}.stop-card{border:1px solid var(--line);background:var(--panel);border-radius:12px;padding:11px;box-shadow:0 8px 24px rgba(0,0,0,.18)}.stop-head{display:flex;align-items:flex-start;gap:9px}.badge{width:25px;height:25px;border-radius:50%;display:grid;place-items:center;font-weight:900;color:#081017;flex:none}.stop-main{min-width:0;flex:1}.stop-title{font-weight:800}.stop-title span{color:var(--gold)}.stop-sub{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.mini-actions{display:flex;gap:4px}.mini-actions button{padding:3px 7px;border-radius:6px}.dategrid{display:grid;grid-template-columns:1fr 90px;gap:8px;margin-top:10px}.dategrid label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:4px}.dategrid input{width:100%}.summarycard{margin-top:16px;border:1px solid var(--line);background:linear-gradient(145deg,#111722,#0c1118);padding:13px;border-radius:12px}.summarygrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.summarygrid b{display:block;font-size:17px}.summarygrid span{font-size:11px;color:var(--muted)}
.mapbox{position:relative;min-height:0;overflow:hidden}.map-surface{position:absolute;inset:0;width:100%;height:100%;background:#090711}.map-surface.hidden{display:none}.map-overlay{position:absolute;right:14px;top:14px;z-index:800;background:rgba(13,10,20,.92);border:1px solid var(--line);border-radius:12px;padding:10px 12px;box-shadow:var(--shadow);font-size:12px;backdrop-filter:blur(12px)}.map-switch{position:absolute;left:14px;top:14px;z-index:800;display:flex;padding:4px;background:rgba(13,10,20,.92);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow)}.map-switch button{padding:7px 12px;border:0;background:transparent;color:var(--muted)}.map-switch button.active{background:#29243a;color:var(--ink);box-shadow:inset 0 0 0 1px #413a58}.leaflet-container{font-family:inherit;background:#090711}.airport-node{background:transparent;border:0}.airport-node-wrap{display:flex;align-items:center;gap:7px;filter:drop-shadow(0 5px 10px rgba(0,0,0,.55))}.airport-node-dot{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;color:#071015;font-size:11px;font-weight:800;border:2px solid #0a0810}.airport-node-label{display:flex;flex-direction:column;min-width:max-content;background:rgba(12,10,18,.9);border:1px solid #40394f;border-radius:8px;padding:4px 7px;backdrop-filter:blur(7px);line-height:1.1}.airport-node-label b{font-size:12px;color:#fff;letter-spacing:.4px}.airport-node-label small{font-size:9px;color:#aaa2b9;margin-top:2px}.leaflet-popup-content-wrapper,.leaflet-popup-tip{background:#171522;color:var(--ink)}.leaflet-control-zoom a{background:#171522!important;color:var(--ink)!important;border-color:var(--line)!important}.cesium-viewer-bottom,.cesium-viewer-toolbar,.cesium-viewer-animationContainer,.cesium-viewer-timelineContainer,.cesium-viewer-fullscreenContainer{display:none!important}.cesium-widget-credits{display:none!important}
.bottom{min-height:0;border-top:1px solid var(--line);background:#090d13;display:grid;grid-template-rows:auto 1fr}.tabsbar{display:flex;align-items:center;gap:5px;padding:10px 14px;border-bottom:1px solid var(--line);background:#0e131b}.tab{background:transparent;color:var(--muted);border-color:transparent;padding:7px 14px}.tab.active{background:#19222e;color:var(--blue);border-color:var(--line)}.tabsbar .spacer{flex:1}.linkbtn{font-size:12px;color:var(--blue);text-decoration:none}.view{overflow:auto;min-height:0}
/* Gantt */.gantt-shell{min-width:980px;padding:18px}.gantt-toolbar{display:flex;align-items:end;gap:12px;margin-bottom:14px}.gantt-toolbar h3{margin:0;font-size:16px}.gantt-toolbar .spacer{flex:1}.gantt-toolbar label{font-size:10px;color:var(--muted);text-transform:uppercase}.gantt-toolbar select{display:block;margin-top:3px}.gantt-grid{display:grid;grid-template-columns:250px minmax(700px,1fr);border:1px solid var(--line);border-radius:12px;overflow:hidden}.gantt-left,.gantt-right{background:#0d1219}.gantt-head{height:56px;border-bottom:1px solid var(--line);background:#121923;position:sticky;top:0;z-index:4}.gantt-left .gantt-head{padding:10px 14px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px}.gantt-row-label{height:58px;border-bottom:1px solid #1b222c;padding:8px 12px;display:flex;align-items:center;gap:10px}.gantt-row-label:last-child,.gantt-row:last-child{border-bottom:0}.gantt-row-label b{display:block}.gantt-row-label small{color:var(--muted)}.gantt-right{position:relative;overflow:hidden}.gantt-head.timeline-head{display:grid;align-items:end}.tick{border-left:1px solid #2a3441;height:100%;padding:8px 5px;font-size:10px;color:var(--muted);display:flex;align-items:flex-end}.gantt-row{height:58px;border-bottom:1px solid #1b222c;position:relative;background-image:linear-gradient(to right,rgba(255,255,255,.035) 1px,transparent 1px);background-size:calc(100% / var(--days)) 100%}.gantt-bar{position:absolute;top:14px;height:30px;border-radius:7px;padding:6px 10px;color:#061019;font-size:11px;font-weight:900;white-space:nowrap;overflow:hidden;box-shadow:0 6px 15px rgba(0,0,0,.25)}.flight-pin{position:absolute;top:7px;width:2px;height:44px;background:var(--gold)}.flight-pin:after{content:'✈';position:absolute;top:-7px;left:-8px;color:var(--gold);font-size:14px}.todayline{position:absolute;top:56px;bottom:0;width:2px;background:var(--danger);z-index:3}.todayline:before{content:'Today';position:absolute;top:-19px;left:-15px;font-size:9px;color:var(--danger)}
/* calendar */.calendar-shell{padding:20px}.calendar-top{display:flex;align-items:center;margin-bottom:16px}.calendar-top h3{margin:0;font-size:17px}.calendar-top .spacer{flex:1}.months{display:grid;grid-template-columns:repeat(auto-fit,minmax(390px,1fr));gap:20px}.month{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#0d1219;box-shadow:0 10px 30px rgba(0,0,0,.2)}.month-title{font-size:17px;font-weight:800;padding:14px 16px;background:#131a24;border-bottom:1px solid var(--line)}.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}.wd{padding:9px;text-align:center;color:var(--muted);font-size:11px;border-bottom:1px solid var(--line)}.day{min-height:82px;border-right:1px solid #1c242f;border-bottom:1px solid #1c242f;padding:7px;position:relative}.day:nth-child(7n){border-right:0}.day.blank{background:#090d13}.daynum{font-size:12px;color:var(--muted)}.day.intrip .daynum{color:var(--ink);font-weight:800}.citychip{margin-top:9px;border-radius:6px;padding:5px 6px;font-size:11px;font-weight:900;color:#061019;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.arrival{position:absolute;right:6px;top:6px;color:var(--gold);font-size:11px}.legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:15px}.legend span{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:12px}.legend i{width:12px;height:12px;border-radius:3px}
/* legs */table{width:100%;border-collapse:collapse}th,td{padding:11px 13px;border-bottom:1px solid #1b232d;text-align:left}th{position:sticky;top:0;background:#121923;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.7px}td.num,th.num{text-align:right}.total td{font-weight:900;color:var(--gold)}
.flight-export{position:relative}.export-menu{display:none;position:absolute;right:0;top:42px;width:min(430px,90vw);z-index:1200;background:#15121f;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:12px}.export-menu.open{display:block}.export-menu h4{margin:0 0 5px}.export-menu p{margin:0 0 10px;color:var(--muted);font-size:12px}.export-all{width:100%;text-align:left;background:linear-gradient(135deg,#29243b,#201c30);margin-bottom:9px}.leg-searches{max-height:260px;overflow:auto;display:flex;flex-direction:column;gap:6px}.leg-search{display:flex;align-items:center;gap:8px;padding:8px;border:1px solid #2b2738;border-radius:9px;background:#100e18}.leg-search div{flex:1}.leg-search small{display:block;color:var(--muted)}.leg-search button{padding:6px 9px}.warning{color:var(--gold);font-size:11px;margin-top:8px}@media(max-width:900px){main{grid-template-columns:1fr}.workspace{grid-template-rows:55vh auto}aside{border-right:0;border-bottom:1px solid var(--line)}.headstats{display:none}.months{grid-template-columns:1fr}.month{min-width:360px}.workspace{min-height:900px}}

/* MapLibre professional map */
.maplibregl-map{font-family:inherit;background:#05070b}.maplibregl-canvas{outline:none}.maplibregl-ctrl-group{background:rgba(14,16,24,.9)!important;border:1px solid var(--line);box-shadow:var(--shadow)!important}.maplibregl-ctrl-group button{border-radius:0}.maplibregl-popup-content{background:#10131c;color:var(--ink);border:1px solid #34394a;border-radius:14px;padding:14px;box-shadow:0 18px 45px rgba(0,0,0,.55)}.maplibregl-popup-tip{border-top-color:#10131c!important;border-bottom-color:#10131c!important}.maplibregl-popup-close-button{color:var(--muted);font-size:20px}.maplibregl-ctrl-attrib{background:rgba(5,7,11,.72)!important;color:#aeb5c4}.maplibregl-ctrl-attrib a{color:#78d7db}.map-error{position:absolute;inset:0;display:grid;place-items:center;text-align:center;padding:30px;background:radial-gradient(circle at 50% 35%,#151b2b,#05070b 62%);z-index:10}.map-error b{display:block;font-size:18px;margin-bottom:8px}.map-error code{color:var(--gold)}
.linkbtn{display:inline-flex;align-items:center;text-decoration:none;white-space:nowrap}.tabsbar button.linkbtn{background:transparent}.brand h1{font-weight:800;letter-spacing:-.03em}.brand small{letter-spacing:.01em}.airport-popup h4{margin:0 0 4px;font-size:16px}.airport-popup .code{color:var(--blue);font-weight:800}.airport-popup .meta{color:var(--muted);font-size:12px;margin-top:5px}.airport-popup .route-no{display:inline-grid;place-items:center;width:22px;height:22px;border-radius:50%;color:#071015;font-weight:800;margin-right:7px}

.mobile-itinerary-btn{display:none;margin-left:auto;padding:8px 11px;background:#171522;border-color:#3b354b}
@media (max-width:900px){
 html,body{overflow-x:hidden}
 header{height:62px;padding:0 12px;gap:10px}
 .brandmark{width:38px;height:38px;border-radius:11px}.brandmark svg{width:33px;height:33px}
 .brand h1{font-size:16px}.brand small{display:none}.mobile-itinerary-btn{display:inline-flex;align-items:center;gap:6px}
 main{display:flex;flex-direction:column;min-height:calc(100vh - 62px)}
 aside{order:2;width:100%;max-height:none;padding:14px;border-right:0;border-top:1px solid var(--line);display:none}
 body.mobile-sidebar-open aside{display:block}
 .workspace{order:1;display:grid;grid-template-rows:minmax(360px,58svh) auto;min-height:0;width:100%}
 .mapbox{min-height:360px}
 .map-switch{left:10px;top:10px}.map-switch button{padding:8px 10px}
 .map-overlay{right:10px;top:60px;max-width:calc(100% - 20px);padding:8px 10px}
 .bottom{min-height:0;overflow:visible}
 .tabsbar{position:sticky;top:62px;z-index:900;display:flex;overflow-x:auto;gap:6px;padding:9px 10px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
 .tabsbar::-webkit-scrollbar{display:none}.tabsbar .spacer{display:none}.tabsbar button,.tabsbar a{flex:0 0 auto;min-height:42px;padding:9px 11px}

  }).filter(s=>s.a);

  activeView='gantt';
  $$('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view==='gantt'));
  render();
  setMapMode('3d');
  setTimeout(()=>{if(travelMap){travelMap.resize();fitTrip()}},350);
};
$$('.tab').forEach(t=>t.onclick=()=>{$$('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');activeView=t.dataset.view;renderView()});
function flightDateForLeg(i){return stops[i+1]?.date||null}
function googleFlightsUrl(query){return 'https://www.google.com/travel/flights?hl=en#flt='+encodeURIComponent(query)}
function buildFlightQuery(i){const from=stops[i],to=stops[i+1],date=flightDateForLeg(i);if(!from||!to)return null;return `${from.a[0]}.${to.a[0]}.${date||''}`}
function buildReadableLeg(i){const from=stops[i],to=stops[i+1],date=flightDateForLeg(i);return `${i+1}. ${from.a[0]} → ${to.a[0]}${date?' · '+date:' · date not set'}`}
function openGoogleFlights(query){window.open(googleFlightsUrl(query),'_blank','noopener,noreferrer')}
function multiCityText(){return stops.slice(0,-1).map((_,i)=>buildReadableLeg(i)).join('\n')}
async function copyMultiCity(){const text=multiCityText();try{await navigator.clipboard.writeText(text);return true}catch{const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();const ok=document.execCommand('copy');ta.remove();return ok}}
function renderExportMenu(){const menu=$('#exportMenu');if(stops.length<2){menu.innerHTML='<h4>Google Flights export</h4><p>Add at least two destinations first.</p>';return}const missing=[];const legs=[];for(let i=0;i<stops.length-1;i++){const date=flightDateForLeg(i);if(!date)missing.push(i+1);legs.push({i,date,query:buildFlightQuery(i)})}menu.innerHTML=`<h4>Google Flights export</h4><p>Google does not publish a dependable multi-city deep-link format. Use the guided export below, or open an exact search for each leg.</p><button class="export-all" data-guide="1"><b>Open Google Flights + copy all legs</b><br><span class="muted">Choose “Multi-city”, then enter the copied route</span></button><div class="leg-searches">${legs.map(x=>`<div class="leg-search"><div><b>Leg ${x.i+1}: ${stops[x.i].a[0]} → ${stops[x.i+1].a[0]}</b><small>${x.date?fmt(parseDate(x.date),true):'Date not set'}</small></div><button data-leg="${x.i}" ${x.date?'':'disabled'}>Search</button></div>`).join('')}</div>${missing.length?`<div class="warning">Set dates for leg${missing.length>1?'s':''} ${missing.join(', ')} before opening those exact searches.</div>`:''}<div id="copyStatus" class="muted" style="margin-top:8px"></div>`}
$('#googleFlights').onclick=e=>{e.stopPropagation();renderExportMenu();$('#exportMenu').classList.toggle('open')};
$('#exportMenu').onclick=async e=>{const guide=e.target.closest('[data-guide]'),leg=e.target.closest('[data-leg]');if(guide){const ok=await copyMultiCity();window.open('https://www.google.com/travel/flights','_blank','noopener,noreferrer');const status=$('#copyStatus');if(status)status.textContent=ok?'Itinerary copied. In Google Flights select Multi-city and paste/reference the legs.':'Google Flights opened. Copy the legs manually from this menu.'}if(leg&&!leg.disabled)openGoogleFlights(buildFlightQuery(+leg.dataset.leg))};
document.addEventListener('click',e=>{if(!e.target.closest('.flight-export'))$('#exportMenu').classList.remove('open')});

function escapeICS(v){return String(v||'').replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n')}
$('#ics').onclick=e=>{e.preventDefault();if(!stops.length)return;let out=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//G Travel//Itinerary//EN','CALSCALE:GREGORIAN'];stops.forEach((s,i)=>{if(!s.date)return;const end=iso(addDays(parseDate(s.date),nights(i))).replaceAll('-','');const start=s.date.replaceAll('-','');out.push('BEGIN:VEVENT',`UID:gtravel-${Date.now()}-${i}@local`,`DTSTART;VALUE=DATE:${start}`,`DTEND;VALUE=DATE:${end}`,`SUMMARY:${escapeICS(s.a[1]+' ('+s.a[0]+')')}`,`LOCATION:${escapeICS(s.a[5]+', '+s.a[2])}`,`DESCRIPTION:${escapeICS('Stop '+(i+1)+' of '+stops.length+' · '+nights(i)+' nights')}`,'END:VEVENT')});out.push('END:VCALENDAR');const blob=new Blob([out.join('\r\n')],{type:'text/calendar'}),u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download='g-travel-itinerary.ics';a.click();URL.revokeObjectURL(u)};
$('#printPlan').onclick=()=>window.print();
$('#csv').onclick=e=>{e.preventDefault();if(!stops.length)return;let s='stop,iata,city,country,arrival,nights,next_stop,distance_km\n';stops.forEach((x,i)=>{const n=stops[i+1],d=n?hav(x.a,n.a):'';s+=`${i+1},${x.a[0]},"${x.a[1]}","${x.a[2]}",${x.date||''},${nights(i)},${n?n.a[0]:''},${d===''?'':d.toFixed(0)}\n`});const u=URL.createObjectURL(new Blob([s],{type:'text/csv'})),a=document.createElement('a');a.href=u;a.download='g-travel-project-itinerary.csv';a.click();URL.revokeObjectURL(u)};
try{const saved=JSON.parse(localStorage.getItem('gTravelStops')||'[]');stops=saved.map(s=>({a:AIRPORTS.find(a=>a[0]===s.iata),date:s.date,nights:s.nights||3})).filter(s=>s.a)}catch{}render();setTimeout(()=>{if(travelMap)travelMap.resize()},100);
</script>
<script>
(function(){
 const btn=document.getElementById('mobileItinerary');
 if(!btn)return;
 btn.addEventListener('click',()=>{
   const open=document.body.classList.toggle('mobile-sidebar-open');
   btn.setAttribute('aria-expanded',String(open));
   btn.textContent=open?'✕ Close itinerary':'☰ Itinerary';
   if(open) document.getElementById('tripSidebar')?.scrollIntoView({behavior:'smooth',block:'start'});
   setTimeout(()=>{ try{ travelMap?.resize(); }catch(e){} },180);
 });
 window.addEventListener('resize',()=>{
   if(window.innerWidth>900){document.body.classList.remove('mobile-sidebar-open');btn.setAttribute('aria-expanded','false');btn.textContent='☰ Itinerary';}
   try{ travelMap?.resize(); }catch(e){}
 });
})();
</script>
